# Mosquitto config for the PowMon compose stack.
# Anonymous access is fine on a trusted home LAN; if yours isn't, set up
# password_file auth (mosquitto_passwd) and put MQTT_USER/MQTT_PASS in .env
# (the collector honors them; the dashboard's MQTT client is anonymous-only).
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
