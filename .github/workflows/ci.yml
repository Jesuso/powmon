name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard:
    name: dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  collector:
    name: collector compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r collector/requirements.txt
      - run: python -m py_compile collector/*.py

  compose:
    name: compose config valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # .env.example carries dummy INVERTER_IP/LOGGER_SERIAL so the required-var
      # checks in compose.yml pass without real secrets.
      - run: cp .env.example .env
      - run: docker compose config -q

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
