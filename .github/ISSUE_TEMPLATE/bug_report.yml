name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [collector, dashboard, mosquitto/compose, infra, docs, not sure]
    validations:
      required: true
  - type: input
    id: inverter
    attributes:
      label: Inverter / datalogger model
      placeholder: e.g. PowMr POW-SunSmart SP5K + Solarman V5 stick
  - type: dropdown
    id: install
    attributes:
      label: How are you running it?
      options: [Docker compose, bare-metal / systemd, other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "collector / dashboard logs. Redact your LOGGER_SERIAL and any tokens."
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
